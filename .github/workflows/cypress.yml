name: Cypress E2E

on:
  pull_request:
    branches: [main]

jobs:
  cypress:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Validate required env for E2E
        run: |
          echo "Checking required env vars..."
          [ -n "$VITE_API_URL" ] || (echo "Missing VITE_API_URL (Actions secret VITE_API_URL)"; exit 1)
          [ -n "$CYPRESS_BASE_URL" ] || (echo "Missing CYPRESS_BASE_URL (Actions secret CYPRESS_BASE_URL)"; exit 1)
          [ -n "$CYPRESS_API_URL" ] || (echo "Missing CYPRESS_API_URL (Actions secret CYPRESS_API_URL)"; exit 1)
          echo "All required env vars are present."
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL }}
          CYPRESS_API_URL: ${{ secrets.CYPRESS_API_URL }}

      - uses: cypress-io/github-action@v6
        with:
          start: npm run dev -- --host 127.0.0.1 --port 5173
          wait-on: 'http://127.0.0.1:5173'
          wait-on-timeout: 180
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          CYPRESS_BASE_URL: ${{ secrets.CYPRESS_BASE_URL }}
          CYPRESS_API_URL: ${{ secrets.CYPRESS_API_URL }}

      - name: Verify app HTML is served (not just port open)
        run: |
          set -e
          echo "Fetching HTML..."
          curl -fsSL http://127.0.0.1:5173/ | head -n 40
          echo "Checking root element exists..."
          curl -fsSL http://127.0.0.1:5173/ | grep -E "<div id=\"root\"|id=\"root\""